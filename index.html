<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      color: #fff;
      font-family: 'Cursive', sans-serif;
    }
    .start-button {
      padding: 20px 40px;
      font-size: 2em;
      background: #ff4a6e;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      transition: background 0.3s ease;
    }
    .start-button:hover {
      background: #e63b5c;
    }
  </style>
</head>
<body>
  <button class="start-button" onclick="window.location.href='mainpage.html'">
    Please click
  </button>
</body>
</html>
